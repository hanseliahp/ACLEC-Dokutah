<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACLEC Dokutah - Admin Artikel</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-8">
  <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-3xl p-8">
    <h1 class="text-4xl font-bold text-gray-800 mb-8 text-center bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
      📰 Admin Artikel ACLEC Dokutah
    </h1>

    <div id="message" class="mb-6 p-4 rounded-lg hidden"></div>

    <!-- Create Form -->
    <div class="bg-blue-50 p-6 rounded-2xl mb-8">
      <h2 class="text-2xl font-semibold mb-4">✨ Buat Artikel Baru</h2>
      <form id="createForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Judul</label>
          <input type="text" id="judul" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Kategori</label>
          <select id="kategori" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
            <option value="">Pilih kategori</option>
            <option value="umum">Umum</option>
            <option value="penyakit">Penyakit</option>
            <option value="gizi">Gizi</option>
            <option value="ibu-anak">Ibu & Anak</option>
            <option value="kesehatan-jiwa">Kesehatan Jiwa</option>
            <option value="obat">Obat</option>
            <option value="tips">Tips</option>
            <option value="darurat">Darurat</option>
            <option value="bpjs">BPJS</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Ringkasan</label>
          <textarea id="ringkasan" rows="3" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Konten (HTML)</label>
          <textarea id="konten" rows="10" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="Gunakan HTML untuk rich content..."></textarea>
        </div>
        <div class="flex gap-4">
          <input type="text" id="gambar_url" placeholder="URL Gambar (optional)" class="flex-1 p-3 border border-gray-300 rounded-xl">
          <input type="text" id="penulis" placeholder="Penulis" value="Admin" class="flex-1 p-3 border border-gray-300 rounded-xl">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 px-8 rounded-2xl font-bold text-lg hover:shadow-xl transform hover:-translate-y-1 transition-all">
          🚀 Publish Artikel
        </button>
      </form>
    </div>

    <!-- Articles List -->
    <div class="space-y-6">
      <h2 class="text-2xl font-semibold">📋 Daftar Artikel</h2>
      <div id="articlesList" class="grid gap-4"></div>
    </div>
  </div>

  <script>
    // Supabase client (use your anon key)
    const supabaseUrl = 'https://thyjjkptwmkcvyhhbaid.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoeWpqa3B0d21rY3Z5aGhiYWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzEwMjcyOTEsImV4cCI6MjA0NjYwMzI5MX0.cOa2bOkwAawXNdL8b3Y4o-7m1iNu0TR-0n6c7b3Q0wQ';
    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    const showMessage = (text, type = 'info') => {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `p-4 rounded-lg mb-6 ${type === 'success' ? 'bg-green-100 text-green-800 border border-green-300' : 
                                             type === 'error' ? 'bg-red-100 text-red-800 border border-red-300' : 
                                             'bg-blue-100 text-blue-800 border border-blue-300'}`;
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 5000);
    };

    // Create article
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      
      const { data: result, error } = await supabase
        .from('artikel')
        .insert([data])
        .select()
        .single();
        
      if (error) {
        showMessage(`Error: ${error.message}`, 'error');
      } else {
        showMessage('✅ Artikel berhasil dibuat!', 'success');
        e.target.reset();
        loadArticles();
      }
    });

    // Load articles
    const loadArticles = async () => {
      const { data, error } = await supabase
        .from('artikel')
        .select('*')
        .eq('aktif', true)
        .order('created_at', { ascending: false });
        
      const container = document.getElementById('articlesList');
      if (error) {
        container.innerHTML = '<p class="text-red-600 p-4 border rounded-xl bg-red-50">Error loading articles: ' + error.message + '</p>';
        return;
      }
      
      container.innerHTML = data.map(article => `
        <div class="p-6 border rounded-2xl hover:shadow-lg transition-all bg-gradient-to-r from-gray-50 to-white">
          <h3 class="font-bold text-xl mb-2">${article.judul}</h3>
          <p class="text-gray-600 mb-2">${article.kategori.toUpperCase()} • ${new Date(article.created_at).toLocaleDateString('id-ID')}</p>
          <p class="text-sm text-gray-500 mb-4">${article.ringkasan?.substring(0, 150)}...</p>
          <div class="flex gap-2">
            <button onclick="editArticle('${article.slug}')" class="px-4 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-600">Edit</button>
            <button onclick="deleteArticle('${article.id_artikel}')" class="px-4 py-2 bg-red-500 text-white rounded-xl hover:bg-red-600">Hapus</button>
          </div>
        </div>
      `).join('');
    };

    // Edit (placeholder)
    const editArticle = (slug) => showMessage(`Edit ${slug} - coming soon!`);
    const deleteArticle = (id) => {
      if (confirm('Hapus artikel?')) {
        supabase.from('artikel').delete().eq('id_artikel', id).then(({ error }) => {
          if (!error) {
            showMessage('✅ Dihapus!');
            loadArticles();
          }
        });
      }
    };

    // Load on start
    loadArticles();
  </script>
</body>
</html>
