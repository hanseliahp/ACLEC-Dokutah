<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat dengan Dokter - Dokutah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            max-width: 70%;
        }
        .message.user {
            background: #007bff;
            color: white;
            margin-left: auto;
        }
        .message.doctor {
            background: #e9ecef;
            color: #333;
        }
        .chat-input {
            padding: 1rem;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        .doctor-list {
            max-height: 70vh;
            overflow-y: auto;
        }
        .doctor-card {
            cursor: pointer;
            transition: background 0.2s;
        }
        .doctor-card:hover {
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-hospital me-2"></i>DOKUTAH
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="#layanan">Layanan</a></li>
                    <li class="nav-item"><a class="nav-link" href="#dokter">Dokter</a></li>
                    <li class="nav-item"><a class="nav-link" href="#lokasi">Lokasi</a></li>
                    <li class="nav-item"><a class="nav-link" href="#artikel">Artikel</a></li>
                    <li class="nav-item"><a class="nav-link active" href="chat.html">Chat</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <h4>Sesi Chat</h4>
                <div id="chat-sessions" class="doctor-list">
                    <!-- Chat sessions will be loaded here -->
                </div>
                <hr>
                <h5>Chat Demo</h5>
                <div class="doctor-card p-3 border rounded mb-2" onclick="startDemoChat()">
                    <div class="d-flex align-items-center">
                        <img src="https://img.freepik.com/free-vector/graident-ai-robot-vectorart_78370-4114.jpg?semt=ais_hybrid&w=740&q=80"
                             class="rounded-circle me-3" width="50" height="50" alt="Demo Doctor">
                        <div>
                            <h6 class="mb-0">Dr. Demo AI</h6>
                            <small class="text-muted">Chat Demo - Tanpa Login</small>
                            <br>
                            <small class="text-success">Online 24/7</small>
                        </div>
                    </div>
                </div>
                <hr>
                <h5>Mulai Chat Baru</h5>
                <div id="doctor-list" class="doctor-list">
                    <!-- Doctors will be loaded here -->
                </div>
            </div>
            <div class="col-md-8">
                <div id="chat-area" class="chat-container border rounded" style="display: none;">
                    <div class="p-3 bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 id="chat-title">Chat dengan Dokter</h5>
                        <div>
                            <small id="demo-badge" class="badge bg-warning text-dark me-2" style="display: none;">DEMO MODE</small>
                            <button id="clear-demo-btn" class="btn btn-sm btn-outline-light" style="display: none;" onclick="clearDemoChat()">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div id="chat-messages" class="chat-messages">
                        <!-- Messages will be loaded here -->
                    </div>
                    <div class="chat-input">
                        <div class="input-group">
                            <input type="text" id="message-input" class="form-control" placeholder="Ketik pesan...">
                            <button class="btn btn-primary" id="send-button">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="no-chat" class="text-center py-5">
                    <i class="fas fa-comments fa-3x text-muted mb-3"></i>
                    <h4>Pilih dokter untuk memulai chat</h4>
                    <p class="text-muted">Pilih dokter dari daftar untuk bertanya seputar kesehatan</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="supabase-client.js"></script>
    <script src="script.js"></script>
    <script>
        // Chat functionality
        let currentSessionId = null;
        let supabase = null;
        let currentUser = null;
        let isDemoMode = false;

        // Initialize Supabase client
        async function initSupabase() {
            if (typeof window.supabaseClient !== 'undefined') {
                supabase = window.supabaseClient;
                try {
                    currentUser = await supabase.auth.getUser();
                    if (currentUser.data.user) {
                        loadChatSessions();
                    }
                } catch (error) {
                    // User not logged in, but that's ok for demo
                    console.log('User not logged in, demo mode available');
                }
                loadDoctors();
            }
        }

        // Helper function to get auth headers
        function getAuthHeaders() {
            const session = supabase.auth.getSession();
            return {
                'Authorization': `Bearer ${session.data.session?.access_token}`,
                'Content-Type': 'application/json'
            };
        }

        // Load chat sessions
        async function loadChatSessions() {
            if (!currentUser?.data?.user) return; // Skip if not logged in

            try {
                const response = await fetch('/api/chat/sessions', {
                    headers: getAuthHeaders()
                });
                if (response.ok) {
                    const data = await response.json();
                    displayChatSessions(data.data);
                }
            } catch (error) {
                console.error('Error loading chat sessions:', error);
            }
        }

        // Load doctors
        async function loadDoctors() {
            try {
                const response = await fetch('/api/dokter');
                if (response.ok) {
                    const data = await response.json();
                    displayDoctors(data.data);
                }
            } catch (error) {
                console.error('Error loading doctors:', error);
            }
        }

        // Start demo chat
        function startDemoChat() {
            isDemoMode = true;
            currentSessionId = 'demo-session-001';
            document.getElementById('chat-title').textContent = 'Chat dengan Dr. Demo AI';
            document.getElementById('demo-badge').style.display = 'inline-block';
            document.getElementById('clear-demo-btn').style.display = 'inline-block';
            document.getElementById('chat-area').style.display = 'flex';
            document.getElementById('no-chat').style.display = 'none';
            loadLocalDemoMessages();
        }

        // Clear demo chat
        function clearDemoChat() {
            if (confirm('Apakah Anda yakin ingin menghapus semua pesan demo?')) {
                localStorage.removeItem('demoMessages');
                loadLocalDemoMessages();
            }
        }

        // Load demo messages from localStorage
        function loadLocalDemoMessages() {
            let messages = JSON.parse(localStorage.getItem('demoMessages') || '[]');

            // Add welcome message if no messages exist
            if (messages.length === 0) {
                messages = [
                    {
                        id: 1,
                        session_id: 'demo-session-001',
                        sender_type: 'doctor',
                        sender_id: 'demo-doctor',
                        message: 'Halo! Selamat datang di Chat Demo Dokutah. Saya Dr. Demo AI, asisten kesehatan virtual. Silakan ajukan pertanyaan Anda seputar kesehatan!',
                        created_at: new Date().toISOString()
                    }
                ];
                saveLocalDemoMessages(messages);
            }

            displayMessages(messages);
        }

        // Save demo messages to localStorage
        function saveLocalDemoMessages(messages) {
            localStorage.setItem('demoMessages', JSON.stringify(messages));
        }

        // Add demo message to local storage
        function addLocalDemoMessage(message, senderType = 'user') {
            const messages = JSON.parse(localStorage.getItem('demoMessages') || '[]');
            const newMessage = {
                id: Date.now(),
                session_id: 'demo-session-001',
                sender_type: senderType,
                sender_id: senderType === 'user' ? 'demo-user' : 'demo-doctor',
                message: message,
                created_at: new Date().toISOString()
            };
            messages.push(newMessage);
            saveLocalDemoMessages(messages);
            return messages;
        }

        // Display chat sessions
        function displayChatSessions(sessions) {
            const container = document.getElementById('chat-sessions');
            container.innerHTML = '';

            if (sessions.length === 0) {
                container.innerHTML = '<p class="text-muted">Belum ada sesi chat</p>';
                return;
            }

            sessions.forEach(session => {
                const card = document.createElement('div');
                card.className = 'doctor-card p-3 border rounded mb-2';
                card.innerHTML = `
                    <div class="d-flex align-items-center">
                        <img src="${session.dokter?.foto_profil_dokter || 'https://via.placeholder.com/50'}" 
                             class="rounded-circle me-3" width="50" height="50" alt="Doctor">
                        <div>
                            <h6 class="mb-0">${session.dokter?.nama_dokter || 'Dokter'}</h6>
                            <small class="text-muted">${session.dokter?.spesialis || ''}</small>
                            <br>
                            <small class="text-muted">${new Date(session.updated_at).toLocaleDateString()}</small>
                        </div>
                    </div>
                `;
                card.onclick = () => openChat(session);
                container.appendChild(card);
            });
        }

        // Display doctors
        function displayDoctors(doctors) {
            const container = document.getElementById('doctor-list');
            container.innerHTML = '';

            doctors.forEach(doctor => {
                const card = document.createElement('div');
                card.className = 'doctor-card p-3 border rounded mb-2';
                card.innerHTML = `
                    <div class="d-flex align-items-center">
                        <img src="${doctor.foto_url || 'https://via.placeholder.com/50'}" 
                             class="rounded-circle me-3" width="50" height="50" alt="Doctor">
                        <div>
                            <h6 class="mb-0">${doctor.nama_dokter}</h6>
                            <small class="text-muted">${doctor.spesialis || ''}</small>
                            <br>
                            <small class="text-success">Online</small>
                        </div>
                    </div>
                `;
                card.onclick = () => startChatWithDoctor(doctor.id_dokter);
                container.appendChild(card);
            });
        }

        // Start chat with doctor
        async function startChatWithDoctor(doctorId) {
            try {
                const response = await fetch('/api/chat/sessions', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ doctor_id: doctorId })
                });

                if (response.ok) {
                    const data = await response.json();
                    loadChatSessions(); // Refresh sessions
                    // Optionally open the chat immediately
                } else {
                    alert('Gagal memulai chat');
                }
            } catch (error) {
                console.error('Error starting chat:', error);
                alert('Error memulai chat');
            }
        }

        // Open chat session
        function openChat(session) {
            isDemoMode = false; // Reset demo mode
            currentSessionId = session.id;
            document.getElementById('chat-title').textContent = `Chat dengan ${session.dokter?.nama_dokter || 'Dokter'}`;
            document.getElementById('demo-badge').style.display = 'none';
            document.getElementById('clear-demo-btn').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
            document.getElementById('no-chat').style.display = 'none';
            loadMessages(session.id);

            // Subscribe to realtime messages
            subscribeToMessages(session.id);
        }

        // Subscribe to realtime messages
        function subscribeToMessages(sessionId) {
            supabase
                .channel(`messages:${sessionId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `session_id=eq.${sessionId}`
                }, (payload) => {
                    // Add new message to UI
                    const message = payload.new;
                    addMessageToUI(message);
                })
                .subscribe();
        }

        // Add message to UI
        function addMessageToUI(message) {
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.sender_type}`;
            messageDiv.innerHTML = `
                <div>${message.message}</div>
                <small class="text-muted">${new Date(message.created_at).toLocaleTimeString()}</small>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Load messages
        async function loadMessages(sessionId) {
            try {
                const response = await fetch(`/api/chat/sessions/${sessionId}/messages`, {
                    headers: getAuthHeaders()
                });
                if (response.ok) {
                    const data = await response.json();
                    displayMessages(data.data);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Display messages
        function displayMessages(messages) {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';

            messages.forEach(message => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${message.sender_type}`;
                messageDiv.innerHTML = `
                    <div>${message.message}</div>
                    <small class="text-muted">${new Date(message.created_at).toLocaleTimeString()}</small>
                `;
                container.appendChild(messageDiv);
            });

            container.scrollTop = container.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();

            if (!message || !currentSessionId) return;

            try {
                if (isDemoMode) {
                    // Handle demo mode with localStorage
                    const messages = addLocalDemoMessage(message, 'user');
                    displayMessages(messages);
                    input.value = '';

                    // Generate AI response after delay
                    setTimeout(() => {
                        const responses = [
                            'Halo! Saya Dr. Demo AI. Bagaimana saya bisa membantu Anda hari ini?',
                            'Baik, saya mengerti keluhan Anda. Apakah Anda memiliki gejala lain?',
                            'Untuk kesehatan yang optimal, disarankan makan teratur dan olahraga rutin.',
                            'Jika gejala memburuk, segera konsultasi ke dokter terdekat.',
                            'Apakah Anda sudah minum obat sesuai anjuran?',
                            'Istirahat yang cukup sangat penting untuk pemulihan.',
                            'Apakah ada riwayat penyakit keluarga yang perlu saya ketahui?',
                            'Saya merekomendasikan Anda untuk minum air putih yang cukup setiap hari.',
                            'Olahraga teratur dapat meningkatkan sistem kekebalan tubuh.',
                            'Pastikan Anda mendapatkan nutrisi yang seimbang dari makanan sehari-hari.'
                        ];
                        const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                        const messages = addLocalDemoMessage(randomResponse, 'doctor');
                        displayMessages(messages);
                    }, 1000 + Math.random() * 2000);

                } else {
                    // Handle authenticated mode
                    const response = await fetch('/api/chat/messages', {
                        method: 'POST',
                        headers: getAuthHeaders(),
                        body: JSON.stringify({ session_id: currentSessionId, message })
                    });

                    if (response.ok) {
                        input.value = '';
                        loadMessages(currentSessionId);
                    } else {
                        alert('Gagal mengirim pesan');
                    }
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Error mengirim pesan');
            }
        }

        // Event listeners
        document.getElementById('send-button').onclick = sendMessage;
        document.getElementById('message-input').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await initSupabase();
            loadChatSessions();
            loadDoctors();
        });
    </script>
</body>
</html>
