<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Artikel - Dokutah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: var(--bg-primary);
            padding-top: 2rem;
        }
        .editor-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .form-section {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
        }
        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        textarea {
            font-family: 'Monaco', 'Courier New', monospace;
            min-height: 300px;
            resize: vertical;
        }
        .btn-group-bottom {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .alert {
            display: none;
            margin-top: 1rem;
        }
        .alert.show {
            display: block;
        }
        .articles-list {
            margin-top: 2rem;
        }
        .article-item {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary-blue);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .article-item:hover {
            box-shadow: var(--card-shadow);
            transform: translateX(5px);
        }
        .article-info h5 {
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .article-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .article-actions {
            display: flex;
            gap: 0.5rem;
        }
        .article-actions button {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-hospital me-2"></i>DOKUTAH
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link active" href="article-editor.html">Editor Artikel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="editor-container">
        <div class="form-section">
            <h1 class="mb-4"><i class="fas fa-pen-fancy me-2 text-primary"></i>Editor Artikel</h1>
            
            <form id="articleForm">
                <div class="mb-3">
                    <label for="title" class="form-label">Judul Artikel</label>
                    <input type="text" class="form-control" id="title" placeholder="Masukkan judul artikel..." required>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">Kategori</label>
                    <select class="form-select" id="category">
                        <option value="Pola Hidup">Pola Hidup</option>
                        <option value="Gizi">Gizi</option>
                        <option value="Inovasi Medis">Inovasi Medis</option>
                        <option value="Tips Kesehatan">Tips Kesehatan</option>
                        <option value="Umum">Umum</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">Isi Artikel</label>
                    <textarea class="form-control" id="content" placeholder="Tulis konten artikel di sini..." required></textarea>
                </div>

                <div class="alert alert-success" id="successAlert" role="alert">
                    <i class="fas fa-check-circle me-2"></i> Artikel berhasil disimpan!
                </div>

                <div class="alert alert-danger" id="errorAlert" role="alert"></div>

                <div class="btn-group-bottom">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Simpan Artikel
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                        <i class="fas fa-redo me-2"></i>Reset
                    </button>
                    <a href="index.html" class="btn btn-outline-dark">
                        <i class="fas fa-arrow-left me-2"></i>Kembali
                    </a>
                </div>
            </form>
        </div>

        <div class="form-section">
            <h2 class="mb-4"><i class="fas fa-list me-2 text-primary"></i>Daftar Artikel</h2>
            <div id="articlesList" class="articles-list">
                <p class="text-muted text-center">Memuat artikel...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById('articleForm');
        const successAlert = document.getElementById('successAlert');
        const errorAlert = document.getElementById('errorAlert');
        const articlesList = document.getElementById('articlesList');

        // Load articles on page load
        loadArticles();

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const category = document.getElementById('category').value;

            try {
                const response = await fetch('/api/articles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title, content, category }),
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert(successAlert, 'Artikel berhasil disimpan!');
                    form.reset();
                    loadArticles();
                } else {
                    showAlert(errorAlert, result.error || 'Gagal menyimpan artikel');
                }
            } catch (err) {
                showAlert(errorAlert, 'Terjadi kesalahan: ' + err.message);
            }
        });

        // Load articles from API
        async function loadArticles() {
            try {
                const response = await fetch('/api/articles');
                const articles = await response.json();

                if (articles.length === 0) {
                    articlesList.innerHTML = '<p class="text-muted text-center">Belum ada artikel.</p>';
                    return;
                }

                articlesList.innerHTML = articles.map(article => `
                    <div class="article-item">
                        <div class="article-info flex-grow-1">
                            <h5>${article.title}</h5>
                            <div class="article-meta">
                                <span class="badge bg-primary">${article.category}</span>
                                <span class="ms-2">${new Date(article.created_at).toLocaleDateString('id-ID')}</span>
                            </div>
                            <p class="text-muted small mt-2">${article.content.substring(0, 100)}...</p>
                        </div>
                        <div class="article-actions">
                            <button class="btn btn-sm btn-info" onclick="editArticle('${article.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteArticle('${article.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                articlesList.innerHTML = `<p class="text-danger">Gagal memuat artikel: ${err.message}</p>`;
            }
        }

        function editArticle(id) {
            alert('Edit fitur akan datang segera!');
        }

        async function deleteArticle(id) {
            if (!confirm('Yakin ingin menghapus artikel ini?')) return;

            try {
                const response = await fetch(`/api/articles/${id}`, {
                    method: 'DELETE',
                });

                if (response.ok) {
                    showAlert(successAlert, 'Artikel berhasil dihapus!');
                    loadArticles();
                } else {
                    showAlert(errorAlert, 'Gagal menghapus artikel');
                }
            } catch (err) {
                showAlert(errorAlert, 'Terjadi kesalahan: ' + err.message);
            }
        }

        function showAlert(alert, message) {
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
