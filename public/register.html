<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokutah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center min-vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card p-4 shadow-sm">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none">
                            <h2 class="fw-bold text-primary"><i class="fas fa-hospital me-2"></i>DOKUTAH</h2>
                        </a>
                        <p class="text-muted mb-0">Buat akun untuk memesan janji temu dan mengelola layanan kesehatan Anda.</p>
                    </div>

                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="registerName" class="form-label">Nama Lengkap</label>
                                <input type="text" class="form-control" id="registerName" placeholder="Nama Anda" required>
                            </div>
                            <div class="col-md-6">
                                <label for="registerPhone" class="form-label">No. Telepon</label>
                                <input type="tel" class="form-control" id="registerPhone" placeholder="0812xxxxxxx" required>
                            </div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label for="registerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" placeholder="alamat@mail.com" required>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="registerPassword" class="form-label">Kata Sandi</label>
                                <input type="password" class="form-control" id="registerPassword" placeholder="Minimal 8 karakter" required>
                            </div>
                            <div class="col-md-6">
                                <label for="registerConfirm" class="form-label">Konfirmasi Kata Sandi</label>
                                <input type="password" class="form-control" id="registerConfirm" placeholder="Ketik ulang kata sandi" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mt-4">Daftar</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-1 text-secondary">Sudah punya akun?</p>
                        <a href="login.html" class="btn btn-outline-primary w-100">Masuk Sekarang</a>
                    </div>

                    <div class="text-center mt-4">
                        <a href="index.html" class="text-decoration-none text-secondary"><i class="fas fa-arrow-left me-2"></i>Kembali ke Beranda</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
